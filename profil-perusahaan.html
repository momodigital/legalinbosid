<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Perusahaan - LegalinBossID</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0B0F17;
            --bg-secondary: #121926;
            --bg-card: #1A2433;
            --accent-gold: #C9A96E;
            --text-primary: #F0F4FA;
            --text-secondary: #B0C0D0;
            --gradient-1: linear-gradient(135deg, #C9A96E 0%, #8B6F4C 100%);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(201, 169, 110, 0.2);
        }

        .logo h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo span {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .back-button a {
            color: var(--accent-gold);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border: 1px solid var(--accent-gold);
            border-radius: 30px;
            transition: all 0.3s ease;
        }

        .back-button a:hover {
            background: rgba(201, 169, 110, 0.1);
        }

        /* Page Title */
        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin: 40px 0 20px;
            padding-left: 20px;
            border-left: 5px solid var(--accent-gold);
        }

        /* Profile Cards */
        .profile-section {
            margin: 40px 0;
        }

        .section-subtitle {
            font-size: 1.8rem;
            margin: 30px 0 20px;
            color: var(--accent-gold);
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin: 20px 0;
        }

        .info-card {
            background: var(--bg-card);
            border: 1px solid rgba(201, 169, 110, 0.1);
            border-radius: 20px;
            padding: 25px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .info-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .info-card h3 {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            color: var(--accent-gold);
        }

        .info-card h3 i {
            font-size: 1.5rem;
        }

        .info-content {
            color: var(--text-secondary);
        }

        .info-content p {
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-content i {
            color: var(--accent-gold);
            width: 20px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--accent-gold);
            border-radius: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            padding: 20px 30px;
            border-bottom: 1px solid rgba(201, 169, 110, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: var(--bg-card);
            border-radius: 30px 30px 0 0;
        }

        .modal-header h2 {
            color: var(--accent-gold);
            font-family: 'Playfair Display', serif;
        }

        .close-modal {
            font-size: 2rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .close-modal:hover {
            color: var(--accent-gold);
        }

        .modal-body {
            padding: 30px;
        }

        .modal-body .detail-item {
            margin: 15px 0;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }

        .modal-body .detail-item strong {
            color: var(--accent-gold);
            display: block;
            margin-bottom: 5px;
        }

        /* Team Cards */
        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .team-card {
            background: var(--bg-card);
            border: 1px solid rgba(201, 169, 110, 0.1);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .team-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-gold);
        }

        .team-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--accent-gold);
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            color: var(--bg-primary);
        }

        .team-card h4 {
            margin-bottom: 5px;
        }

        .team-card p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Online Services */
        .online-highlight {
            background: linear-gradient(145deg, #1A2433, #0F1722);
            border: 1px solid var(--accent-gold);
            border-radius: 30px;
            padding: 40px;
            margin: 40px 0;
            text-align: center;
        }

        .online-highlight h2 {
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .badge-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
        }

        .badge {
            background: rgba(201, 169, 110, 0.1);
            border: 1px solid var(--accent-gold);
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
        }

        .badge i {
            color: var(--accent-gold);
            margin-right: 8px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .page-title {
                font-size: 2rem;
            }
            
            .info-grid {
                grid-template-columns: 1fr;
            }
            
            .online-highlight {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Navbar -->
        <nav class="navbar">
            <div class="logo">
                <h1>LegalinBossID</h1>
                <span>PROFIL PERUSAHAAN</span>
            </div>
            <div class="back-button">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Kembali ke Beranda</a>
            </div>
        </nav>

        <!-- Page Title -->
        <h1 class="page-title">Profil Perusahaan</h1>

        <!-- Info Cards Grid -->
        <div class="profile-section">
            <div class="info-grid" id="profileCards">
                <!-- Akan diisi oleh JavaScript -->
            </div>
        </div>

        <!-- Online Service Highlight -->
        <div class="online-highlight">
            <i class="fas fa-globe" style="font-size: 3rem; color: var(--accent-gold); margin-bottom: 20px;"></i>
            <h2>🌐 Melayani Seluruh Indonesia via Online</h2>
            <p style="margin-bottom: 20px;">Kantor pusat di Jakarta, layanan online untuk 34 provinsi. Tidak perlu datang!</p>
            <div class="badge-container" id="onlineMethods">
                <!-- Akan diisi oleh JavaScript -->
            </div>
        </div>

        <!-- Team Section -->
        <h2 class="section-subtitle">Tim Manajemen</h2>
        <div class="team-grid" id="teamCards">
            <!-- Akan diisi oleh JavaScript -->
        </div>

        <!-- Modal -->
        <div class="modal" id="detailModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modalTitle">Detail Informasi</h2>
                    <span class="close-modal" onclick="closeModal()">&times;</span>
                </div>
                <div class="modal-body" id="modalBody">
                    <!-- Konten modal akan diisi JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <!-- Load Company Profile Data -->
    <script src="assets/js/company-profile.js"></script>
    
    <script>
        // Data untuk cards profil
        const profileCardsData = [
            {
                id: 'basicInfo',
                icon: 'fa-building',
                title: 'Informasi Dasar',
                data: companyProfile.basicInfo
            },
            {
                id: 'visionMission',
                icon: 'fa-eye',
                title: 'Visi & Misi',
                data: companyProfile.visionMission
            },
            {
                id: 'offices',
                icon: 'fa-map-marker-alt',
                title: 'Kantor & Layanan',
                data: companyProfile.offices
            },
            {
                id: 'expertise',
                icon: 'fa-briefcase',
                title: 'Bidang Keahlian',
                data: companyProfile.expertise
            },
            {
                id: 'clients',
                icon: 'fa-users',
                title: 'Klien & Portofolio',
                data: companyProfile.clients
            },
            {
                id: 'onlineServices',
                icon: 'fa-laptop',
                title: 'Layanan Online',
                data: companyProfile.onlineServices
            }
        ];

        // Render profile cards
        function renderProfileCards() {
            const container = document.getElementById('profileCards');
            
            profileCardsData.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.className = 'info-card';
                cardElement.onclick = () => showDetail(card.id, card.data);
                
                let previewText = '';
                if (card.id === 'basicInfo') {
                    previewText = card.data.companyName;
                } else if (card.id === 'offices') {
                    previewText = 'Kantor Pusat Jakarta • Online Seluruh Indonesia';
                } else if (card.id === 'clients') {
                    previewText = `${card.data.totalKlien} • ${card.data.coverage}`;
                } else if (card.id === 'visionMission') {
                    previewText = card.data.vision.substring(0, 50) + '...';
                } else {
                    previewText = 'Klik untuk detail lengkap';
                }
                
                cardElement.innerHTML = `
                    <h3>
                        <i class="fas ${card.icon}"></i>
                        ${card.title}
                    </h3>
                    <div class="info-content">
                        <p><i class="fas fa-info-circle"></i> ${previewText}</p>
                        <p style="color: var(--accent-gold); margin-top: 15px;">
                            <i class="fas fa-mouse-pointer"></i> Klik untuk detail
                        </p>
                    </div>
                `;
                
                container.appendChild(cardElement);
            });
        }

        // Render online methods badges
        function renderOnlineBadges() {
            const container = document.getElementById('onlineMethods');
            const methods = companyProfile.onlineServices.platform;
            
            methods.forEach(method => {
                const badge = document.createElement('span');
                badge.className = 'badge';
                
                let icon = 'fa-comment';
                if (method.nama.includes('Zoom')) icon = 'fa-video';
                else if (method.nama.includes('WhatsApp')) icon = 'fa-whatsapp';
                else if (method.nama.includes('Email')) icon = 'fa-envelope';
                else if (method.nama.includes('Google')) icon = 'fa-google';
                
                badge.innerHTML = `<i class="fab ${icon}"></i> ${method.nama}`;
                container.appendChild(badge);
            });
        }

        // Render team cards
        function renderTeamCards() {
            const container = document.getElementById('teamCards');
            const directors = companyProfile.management.directors;
            
            directors.forEach(person => {
                const card = document.createElement('div');
                card.className = 'team-card';
                card.onclick = () => showPersonDetail(person);
                
                const initials = person.name.split(' ').map(n => n[0]).join('').substring(0, 2);
                
                card.innerHTML = `
                    <div class="team-avatar">${initials}</div>
                    <h4>${person.name}</h4>
                    <p>${person.position}</p>
                    <p style="font-size: 0.8rem; margin-top: 5px;">${person.expertise}</p>
                    <p style="color: var(--accent-gold); font-size: 0.8rem; margin-top: 10px;">
                        <i class="fas fa-map-marker-alt"></i> ${person.location}
                    </p>
                `;
                
                container.appendChild(card);
            });
        }

        // Show detail in modal
        function showDetail(cardId, data) {
            const modalTitle = document.getElementById('modalTitle');
            const modalBody = document.getElementById('modalBody');
            
            modalTitle.textContent = profileCardsData.find(c => c.id === cardId).title;
            
            let html = '';
            
            if (cardId === 'basicInfo') {
                html = `
                    <div class="detail-item">
                        <strong>Nama Perusahaan</strong>
                        <p>${data.companyName}</p>
                    </div>
                    <div class="detail-item">
                        <strong>Brand</strong>
                        <p>${data.brandName}</p>
                    </div>
                    <div class="detail-item">
                        <strong>Tagline</strong>
                        <p>${data.tagline}</p>
                    </div>
                    <div class="detail-item">
                        <strong>Berdiri</strong>
                        <p>${data.established}</p>
                    </div>
                    <div class="detail-item">
                        <strong>Badan Hukum</strong>
                        <p>${data.legalEntity}</p>
                    </div>
                    <div class="detail-item">
                        <strong>Akta Pendirian</strong>
                        <p>${data.aktaPendirian}</p>
                    </div>
                    <div class="detail-item">
                        <strong>NPWP</strong>
                        <p>${data.npwp}</p>
                    </div>
                    <div class="detail-item">
                        <strong>NIB</strong>
                        <p>${data.nib}</p>
                    </div>
                `;
            } else if (cardId === 'visionMission') {
                html = `
                    <div class="detail-item">
                        <strong>Visi</strong>
                        <p>${data.vision}</p>
                    </div>
                    <div class="detail-item">
                        <strong>Misi</strong>
                        <ul style="margin-left: 20px;">
                            ${data.mission.map(m => `<li>${m}</li>`).join('')}
                        </ul>
                    </div>
                    <div class="detail-item">
                        <strong>Nilai-Nilai</strong>
                        ${data.values.map(v => `
                            <p><strong>${v.name}:</strong> ${v.description}</p>
                        `).join('')}
                    </div>
                `;
            } else if (cardId === 'offices') {
                html = `
                    <div class="detail-item">
                        <strong>Kantor Pusat Jakarta</strong>
                        <p>${data.headOffice.address}</p>
                        <p>${data.headOffice.street}</p>
                        <p>${data.headOffice.area}, ${data.headOffice.city}</p>
                        <p>${data.headOffice.province} ${data.headOffice.postalCode}</p>
                        <p>Telp: ${data.headOffice.phone}</p>
                        <p>Email: ${data.headOffice.email}</p>
                    </div>
                    <div class="detail-item">
                        <strong>Layanan Online</strong>
                        <p>Status: ${data.layananOnline.status}</p>
                        <p>Metode: ${data.layananOnline.metode.join(', ')}</p>
                        <p>Jangkauan: Seluruh Indonesia (34 provinsi)</p>
                    </div>
                    <div class="detail-item">
                        <strong>Jam Operasional</strong>
                        <p>Senin-Jumat: ${data.operationalHours.mondayFriday}</p>
                        <p>Sabtu: ${data.operationalHours.saturday}</p>
                        <p>Online: ${data.operationalHours.onlineLayanan}</p>
                    </div>
                `;
            } else if (cardId === 'expertise') {
                html = data.map(cat => `
                    <div class="detail-item">
                        <strong>${cat.category}</strong>
                        <p>${cat.services.join(' • ')}</p>
                        <p><i class="fas fa-check-circle" style="color: green;"></i> Layanan Online: ${cat.online ? 'Ya' : 'Tidak'}</p>
                    </div>
                `).join('');
            } else if (cardId === 'clients') {
                html = `
                    <div class="detail-item">
                        <strong>Total Klien</strong>
                        <p>${data.totalKlien}</p>
                    </div>
                    <div class="detail-item">
                        <strong>Cakupan Wilayah</strong>
                        <p>${data.coverage}</p>
                    </div>
                    <div class="detail-item">
                        <strong>Jenis Klien</strong>
                        <ul>
                            ${data.jenisKlien.map(j => `<li>${j}</li>`).join('')}
                        </ul>
                    </div>
                `;
            } else if (cardId === 'onlineServices') {
                html = `
                    <div class="detail-item">
                        <strong>Platform yang Digunakan</strong>
                        ${data.platform.map(p => `
                            <p><i class="fas fa-check"></i> ${p.nama}: ${p.untuk}</p>
                        `).join('')}
                    </div>
                    <div class="detail-item">
                        <strong>Alur Proses Online</strong>
                        <ol>
                            ${data.alurProses.map(p => `<li>${p}</li>`).join('')}
                        </ol>
                    </div>
                `;
            }
            
            modalBody.innerHTML = html;
            document.getElementById('detailModal').classList.add('active');
        }

        // Show person detail in modal
        function showPersonDetail(person) {
            const modalTitle = document.getElementById('modalTitle');
            const modalBody = document.getElementById('modalBody');
            
            modalTitle.textContent = person.name;
            
            modalBody.innerHTML = `
                <div class="detail-item">
                    <strong>Posisi</strong>
                    <p>${person.position}</p>
                </div>
                <div class="detail-item">
                    <strong>Keahlian</strong>
                    <p>${person.expertise}</p>
                </div>
                <div class="detail-item">
                    <strong>Pengalaman</strong>
                    <p>${person.experience}</p>
                </div>
                <div class="detail-item">
                    <strong>Pendidikan</strong>
                    <p>${person.education}</p>
                </div>
                <div class="detail-item">
                    <strong>Lokasi</strong>
                    <p>${person.location}</p>
                </div>
            `;
            
            document.getElementById('detailModal').classList.add('active');
        }

        // Close modal
        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('detailModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            renderProfileCards();
            renderOnlineBadges();
            renderTeamCards();
        });
    </script>
</body>
</html>
