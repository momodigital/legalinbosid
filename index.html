<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegalinBossID - Legal Consultant</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
    <link rel="stylesheet" href="styles.css">
    </style>
</head>
<body>
    <div class="container">
        <!-- Navbar sama persis seperti sebelumnya -->
    </div>

    <!-- Chat Widget -->
    <div class="chat-widget">
        <!-- Chat button dan box sama persis -->
    </div>

    <script>
        // ========== DATA ==========
        const websiteData = {
            mainServices: [
                "Pendirian dan Perubahan Badan Usaha",
                "Contractor Safety Management System (CSMS)",
                "SK Pengangkutan Limbah B3 49432 / Kimia",
                "Kartu Pengawasan",
                "Izin Niaga Umum (INU)",
                "Penyimpanan Migas (SKUP)",
                "Standar Nasional Indonesia (SNI)",
                "Nomor Induk Berusaha (NIB)"
            ],
            // ... data lainnya
        };

        // ========== RENDER KONTEN ==========
        function renderServices() {
            const mainContainer = document.getElementById('mainServices');
            if (!mainContainer) return;
            
            mainContainer.innerHTML = '';
            websiteData.mainServices.forEach((service, index) => {
                mainContainer.innerHTML += `
                    <div class="service-card">
                        <div class="service-icon"><i class="fas fa-building"></i></div>
                        <h3>${service}</h3>
                        <p>Layanan profesional untuk kebutuhan bisnis Anda</p>
                    </div>
                `;
            });
        }

        // ========== CHAT FUNCTIONALITY ==========
        let messages = [
            { text: "Halo! Saya AI Legal Assistant dari LegalinBossID. Ada yang bisa saya bantu? ⚖️", isUser: false }
        ];

        function renderMessages() {
            const chatMessages = document.getElementById('chatMessages');
            if (!chatMessages) return;

            chatMessages.innerHTML = '';
            messages.forEach(msg => {
                chatMessages.innerHTML += `
                    <div class="message-wrapper">
                        <div class="message ${msg.isUser ? 'user-message' : 'bot-message'}">${msg.text}</div>
                        <div class="message-time">${new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' })}</div>
                    </div>
                `;
            });
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // ========== EVENT LISTENERS ==========
        document.addEventListener('DOMContentLoaded', function() {
            renderServices();
            
            // Chat button
            const chatButton = document.getElementById('chatButton');
            const chatBox = document.getElementById('chatBox');
            const closeChat = document.getElementById('closeChat');
            const chatForm = document.getElementById('chatForm');
            const chatInput = document.getElementById('chatInput');

            if (chatButton && chatBox) {
                chatButton.onclick = function() {
                    chatBox.style.display = 'flex';
                    chatButton.style.display = 'none';
                    renderMessages();
                };
            }

            if (closeChat) {
                closeChat.onclick = function() {
                    chatBox.style.display = 'none';
                    chatButton.style.display = 'flex';
                };
            }

            if (chatForm) {
                chatForm.onsubmit = function(e) {
                    e.preventDefault();
                    const message = chatInput.value.trim();
                    if (!message) return;

                    // Add user message
                    messages.push({ text: message, isUser: true });
                    renderMessages();
                    chatInput.value = '';

                    // Simulate AI response
                    setTimeout(() => {
                        messages.push({ 
                            text: "Terima kasih atas pertanyaannya. Untuk informasi lebih detail, silakan hubungi tim kami via WhatsApp di 0877 1537 3601 untuk konsultasi gratis!", 
                            isUser: false 
                        });
                        renderMessages();
                    }, 1000);
                };
            }
        });
    </script>
</body>
</html>
